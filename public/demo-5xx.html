<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5xx Demo | Lejiend API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .demo-wrap {
        min-height: calc(100vh - 120px);
        display: grid;
        place-items: center;
        padding: 2rem 1rem 3rem;
      }

      .demo-card {
        width: min(780px, 92vw);
        background: rgba(9, 12, 22, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 22px;
        padding: 1.5rem;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
      }

      .demo-card h1 {
        margin-top: 0;
      }

      .demo-grid {
        display: grid;
        gap: 0.8rem;
      }

      .demo-grid input {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        padding: 0.8rem 0.9rem;
        font-size: 1rem;
      }

      .demo-actions {
        display: flex;
        gap: 0.8rem;
        flex-wrap: wrap;
      }

      pre {
        margin: 0;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(0, 0, 0, 0.35);
        color: #d9fbd3;
        padding: 1rem;
        min-height: 170px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>
    <header class="topbar">
      <div class="brand">Lejiend API</div>
      <a class="status-pill" href="/">Back Home</a>
    </header>

    <main class="demo-wrap">
      <section class="demo-card">
        <p class="label">Classroom Lab</p>
        <h1>Intentional 5xx Error Demo</h1>
        <p class="subtitle">
          Use this page to trigger a predictable HTTP 500 response and show your class how clients
          should handle server-side failures.
        </p>

        <div class="demo-grid">
          <label for="apiKey">API key</label>
          <input id="apiKey" type="text" placeholder="Enter x-api-key value" />
          <div class="demo-actions">
            <button class="btn btn-primary" id="triggerBtn">Trigger 500</button>
            <button class="btn btn-ghost" id="syntaxBtn">Trigger Syntax 500</button>
            <button class="btn btn-ghost" id="clearBtn">Clear Output</button>
          </div>
          <pre id="output">Ready. Enter API key and click Trigger 500.</pre>
        </div>
      </section>
    </main>

    <script>
      const output = document.getElementById('output');
      const apiKeyInput = document.getElementById('apiKey');
      const triggerBtn = document.getElementById('triggerBtn');
      const syntaxBtn = document.getElementById('syntaxBtn');
      const clearBtn = document.getElementById('clearBtn');

      const print = (value) => {
        output.textContent = value;
      };

      triggerBtn.addEventListener('click', async () => {
        const apiKey = apiKeyInput.value.trim();

        if (!apiKey) {
          print('Please provide an API key first.');
          return;
        }

        print('Requesting /api/demo/force-500 ...');

        try {
          const res = await fetch('/api/demo/force-500', {
            headers: {
              'x-api-key': apiKey,
            },
          });

          const body = await res.text();
          print([
            `Status: ${res.status} ${res.statusText}`,
            '--- Headers ---',
            `content-type: ${res.headers.get('content-type') || 'n/a'}`,
            '--- Body ---',
            body,
          ].join('\n'));
        } catch (err) {
          print(`Request failed before reaching server: ${err.message}`);
        }
      });

      syntaxBtn.addEventListener('click', async () => {
        print('Requesting /demo/5xx/syntax-error ...');

        try {
          const res = await fetch('/demo/5xx/syntax-error');
          const body = await res.text();
          print([
            `Status: ${res.status} ${res.statusText}`,
            '--- Headers ---',
            `content-type: ${res.headers.get('content-type') || 'n/a'}`,
            '--- Body ---',
            body,
          ].join('\n'));
        } catch (err) {
          print(`Request failed before reaching server: ${err.message}`);
        }
      });

      clearBtn.addEventListener('click', () => {
        print('Ready. Enter API key and click Trigger 500.');
      });
    </script>
  </body>
</html>
